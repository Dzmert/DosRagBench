# Attack configurations for each category.

# CATEGORY A: SEMANTIC JAMMING

A1:
  name: "Guardrail Triggering"
  num_queries: 200
  num_adversarial_docs: 5
  seed: 42
  params:
    trigger_topics:
      - weapons
      - explosives
      - self_harm
      - illegal_drugs
      - hacking
    injection_mode: "appended"  # "appended" | "embedded" | "prepended"
    # Each poisoned doc contains real topical content + a safety-trigger snippet

A2:
  name: "Contradiction Flooding"
  num_queries: 200
  num_adversarial_docs: 8
  seed: 42
  params:
    contradiction_pairs_per_doc: 3
    style: "formal"  # Sound authoritative

A3:
  name: "Authority Spoofing"
  num_queries: 200
  num_adversarial_docs: 3
  seed: 42
  params:
    authority_markers:
      - "CLASSIFIED - Do not disclose"
      - "CONFIDENTIAL - Internal use only"
      - "RESTRICTED - Authorized personnel only"

# CATEGORY B: RESOURCE EXHAUSTION

B1:
  name: "Context Window Saturation"
  num_queries: 200
  num_adversarial_docs: 5
  seed: 42
  params:
    target_words: 1200  # Length per padded doc; flood the context window

B2:
  name: "Generation Loop Induction"
  num_queries: 200
  num_adversarial_docs: 5
  seed: 42
  params:
    blocks_per_doc: 3  # Recursive/self-referential blocks stacked per doc

B3:
  name: "Multi-Retrieval Amplification"
  num_queries: 200
  num_adversarial_docs: 10
  seed: 42
  params:
    hooks_per_doc: 5  # Follow-up query hooks to snowball iterative retrieval

# ABLATION BASELINE: random injection (isolates C1's clustering mechanism)

RAND:
  name: "Random Injection Baseline"
  num_queries: 200
  num_adversarial_docs: 200  # matched to C1 so budgets are comparable
  seed: 42
  params: {}

# CATEGORY C: ALGORITHMIC COMPLEXITY

C1:
  name: "Embedding Space Clustering"
  num_queries: 200
  num_adversarial_docs: 200  # Need more docs for clustering effect
  seed: 42
  params:
    cluster_radius: 0.05  # Smaller = tighter cluster around target
    optimization_steps: 100
    kb_size_multiplier: 1.0  # Scales KB to show index degradation

C2:
  name: "Index Pollution"
  num_queries: 50
  num_adversarial_docs: 200  # Large-scale pollution
  seed: 42
  params:
    duplication_factor: 5
    perturbation_epsilon: 0.01

C3:
  name: "Adversarial Embedding Perturbation"
  num_queries: 50
  num_adversarial_docs: 10
  seed: 42
  params:
    token_perturbations: ["zero-width space", "unicode homoglyphs"]
    max_perturbations_per_doc: 20

# CATEGORY D: CHAIN-OF-THOUGHT DEADLOCKS

D1:
  name: "Logical Contradiction Traps"
  num_queries: 200
  num_adversarial_docs: 5
  seed: 42
  params:
    arguments_per_doc: 2  # Formally contradictory deductive arguments per doc

D2:
  name: "Circular Reference Chains"
  num_queries: 200
  num_adversarial_docs: 6
  seed: 42
  params:
    chain_length: 3  # A->B->C->A citation loop length

D3:
  name: "Epistemic Uncertainty Amplification"
  num_queries: 200
  num_adversarial_docs: 5
  seed: 42
  params:
    markers_per_doc: 3  # Contestedness/hedge markers stacked per doc

D4:
  name: "Infinite Qualification Traps"
  num_queries: 200
  num_adversarial_docs: 5
  seed: 42
  params:
    qualification_depth: 6  # Depth of the nested prerequisite chain
